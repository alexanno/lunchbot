name: Update Lunch Topic

on:
  # Every Monday at 08:00 UTC
  schedule:
    - cron: "0 8 * * 1"
  # Allow manual runs from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Fetch new lunch topic
        run: uv run --with requests --with beautifulsoup4 python scripts/fetch_topic.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add topic.json
          if git diff --staged --quiet; then
            echo "topic.json unchanged — skipping commit"
          else
            git commit -m "chore: lunch topic — week $(date +%V)"
            git push
          fi
